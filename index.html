<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Metal 7</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <img src="assets/img/cabecario.jpeg" alt="Metal 7">
        </div>
        <nav class="menu">
            <a href="#">Início</a>
            <a href="#">Sobre</a>
            <a href="#">Serviços</a>
            <a href="#">Contato</a>
        </nav>
    </header>
    <div class="barra-rolagem"></div>
    <script>
    window.addEventListener("scroll", () => {
        const scrollTop = window.scrollY;
        const alturaPagina = document.documentElement.scrollHeight - window.innerHeight;
        const progresso = (scrollTop / alturaPagina) * 100
        document.querySelector(".barra-rolagem").style.width = progresso + "%";
    });
    
    </script>

</body>


</html>
